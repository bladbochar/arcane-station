- type: entity
  id: EffectSemenSplat
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 3.0
  - type: Sprite
    noRot: true
    drawdepth: Effects
    sprite: /Textures/_Arcane/Effects/spermpuff.rsi
    state: spermpuff
  - type: EffectVisuals
  - type: Tag
    tags:
    - HideContextMenu
  - type: AnimationPlayer

- type: entity
  id: PuddleSemenBase
  abstract: true
  categories: [ HideSpawnMenu ]
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
    noRot: false
  - type: Sprite
    noRot: true
    drawdepth: Puddles
    sprite: /Textures/_Arcane/Effects/genitals_effects.rsi
    state: semen1
  - type: Clickable
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      slipFixture:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        mask:
        - ItemMask
        layer:
        - SlipLayer
        hard: false
  - type: Puddle
  - type: SolutionContainerManager
    solutions:
      puddle:
        maxVol: 1000
        reagents:
        - ReagentId: Semen
          Quantity: 10
  - type: MixableSolution
    solution: puddle
  - type: Appearance
  - type: ExaminableSolution
    solution: puddle
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  id: PuddleSemen1
  parent: PuddleSemenBase

